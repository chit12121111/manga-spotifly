# Deploy manga-spotifly ไปยัง GitHub Pages
# เปิดใช้: Repo → Settings → Pages → Source = "GitHub Actions"
# ถ้า repo มีแค่โฟลเดอร์ manga-spotifly ให้ใช้ workflow นี้ใน repo นั้น (root = โฟลเดอร์โปรเจกต์)

name: Deploy ไปยัง GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ติดตั้ง Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: ติดตั้ง dependencies
        run: npm ci

      - name: Build
        env:
          VITE_BASE: ${{ github.event.repository.name }}
        run: npm run build

      - name: อัปโหลด artifact
